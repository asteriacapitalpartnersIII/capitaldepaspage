  <!-- Structured data: Organization -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #F5F3EE;
      color: #0E0E0C;
      cursor: none;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #F0EDE7; }
    ::-webkit-scrollbar-thumb { background: rgba(21,80,232,0.25); border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(21,80,232,0.5); }
    ::selection { background: rgba(21,80,232,0.15); color: #0E0E0C; }

    input, textarea, select, button, a { cursor: none; }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; }
      50%  { transform: scaleY(1); transform-origin: top; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    body, button, input, select, textarea { font-family: 'DM Sans', system-ui, sans-serif; }
    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
    textarea { font-family: 'DM Sans', sans-serif; }
    :focus-visible { outline: 2px solid rgba(21,80,232,0.4); outline-offset: 2px; }

    .mapboxgl-canvas { cursor: none !important; }
    .mapboxgl-popup-content {
      font-family: 'DM Sans', sans-serif;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }
    .mapboxgl-ctrl-attrib { font-size: 10px; }
  </style>

  <script>
    // Carga el token de Mapbox desde /api/config (variable de entorno en Vercel).
    // Esto evita commitear el token y permite rotarlo sin redeploy de código.
    (function() {
      window.MAPBOX_TOKEN_READY = new Promise(function(resolve) {
        fetch('/api/config').then(function(r){ return r.ok ? r.json() : {}; }).then(function(cfg){
          if (cfg && cfg.mapboxToken) {
            window.MAPBOX_TOKEN = cfg.mapboxToken;
            if (typeof mapboxgl !== 'undefined') mapboxgl.accessToken = cfg.mapboxToken;
          }
          resolve(window.MAPBOX_TOKEN || null);
        }).catch(function(){ resolve(null); });
      });
    })();
  </script>
</head>
