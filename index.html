  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #F5F3EE;
      color: #0E0E0C;
      cursor: none;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #F0EDE7; }
    ::-webkit-scrollbar-thumb { background: rgba(21,80,232,0.25); border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(21,80,232,0.5); }
    ::selection { background: rgba(21,80,232,0.15); color: #0E0E0C; }

    input, textarea, select, button, a { cursor: none; }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; }
      50%  { transform: scaleY(1); transform-origin: top; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width:0; height:0; }
    input[type="range"]::-moz-range-thumb { width:0; height:0; border:none; }
    textarea { font-family: 'DM Sans', sans-serif; }
    :focus-visible { outline: 2px solid rgba(21,80,232,0.4); outline-offset: 2px; }
  </style>
